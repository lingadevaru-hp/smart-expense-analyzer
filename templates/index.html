<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }

        .upload-area p {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-area small {
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card h3 {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .value {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .chart-container h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.2em;
        }

        .anomalies-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .anomalies-section h3 {
            margin-bottom: 20px;
            color: #e74c3c;
            font-size: 1.2em;
        }

        .anomaly-item {
            border-left: 4px solid #e74c3c;
            padding: 15px;
            margin-bottom: 15px;
            background: #fff5f5;
            border-radius: 4px;
        }

        .anomaly-item .date {
            font-weight: bold;
            color: #333;
        }

        .anomaly-item .amount {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1em;
        }

        .anomaly-item .reason {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .no-anomalies {
            padding: 20px;
            text-align: center;
            color: #27ae60;
            background: #f0fff4;
            border-radius: 4px;
        }

        .error {
            background: #fadbd8;
            color: #c0392b;
            padding: 15px;
            border-radius: 6px;
            display: none;
            margin-bottom: 20px;
            border-left: 4px solid #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #ddd;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .category-badge {
            display: inline-block;
            background: #e8ebff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .file-name {
            margin-top: 15px;
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }

            .upload-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Smart Expense Analyzer</h1>
            <p>Intelligent expense categorization & anomaly detection</p>
        </div>

        <div class="upload-section">
            <div class="error" id="error"></div>

            <div class="upload-area" id="uploadArea">
                <p>📁 Drag & drop your CSV file here</p>
                <small>or click to select</small>
                <input type="file" id="fileInput" accept=".csv" />
                <button class="btn" onclick="document.getElementById('fileInput').click()">Choose File</button>
                <div class="file-name" id="fileName"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: #667eea;">Analyzing your expenses...</p>
            </div>
        </div>

        <div class="results" id="results">
            <div class="summary-cards">
                <div class="card">
                    <h3>Total Spent</h3>
                    <div class="value">₹<span id="totalSpent">0</span></div>
                </div>
                <div class="card">
                    <h3>Transactions</h3>
                    <div class="value"><span id="transCount">0</span></div>
                </div>
                <div class="card">
                    <h3>Average</h3>
                    <div class="value">₹<span id="avgTransaction">0</span></div>
                </div>
                <div class="card">
                    <h3>Anomalies</h3>
                    <div class="value" style="color: #e74c3c;"><span id="anomalyCount">0</span></div>
                </div>
            </div>

            <div class="charts-section">
                <div class="chart-container">
                    <h3>📊 Spending by Category</h3>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>🥧 Distribution</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

            <div class="anomalies-section">
                <h3>⚠️ Anomalies Detected</h3>
                <div id="anomaliesList"></div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorDiv = document.getElementById('error');
        const fileName = document.getElementById('fileName');

        let barChart = null;
        let pieChart = null;

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileUpload();
            }
        });

        fileInput.addEventListener('change', handleFileUpload);

        function handleFileUpload() {
            const file = fileInput.files[0];
            if (!file) return;

            fileName.textContent = `📄 ${file.name}`;
            uploadFile(file);
        }

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            errorDiv.style.display = 'none';
            loading.style.display = 'block';
            results.style.display = 'none';

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                if (data.error) {
                    showError(data.error);
                } else {
                    displayResults(data);
                    results.style.display = 'block';
                }
            })
            .catch(err => {
                loading.style.display = 'none';
                showError('Failed to upload: ' + err.message);
            });
        }

        function showError(message) {
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        function displayResults(data) {
            // Update summary
            document.getElementById('totalSpent').textContent = data.total_spent.toFixed(0);
            document.getElementById('transCount').textContent = data.transactions_count;
            document.getElementById('avgTransaction').textContent = data.avg_transaction.toFixed(0);
            document.getElementById('anomalyCount').textContent = data.anomalies_count;

            // Update charts
            const categories = data.breakdown.map(b => b.category);
            const totals = data.breakdown.map(b => b.total);

            updateBarChart(categories, totals);
            updatePieChart(categories, totals);

            // Update anomalies
            displayAnomalies(data.anomalies);
        }

        function updateBarChart(categories, totals) {
            const ctx = document.getElementById('barChart').getContext('2d');
            
            if (barChart) barChart.destroy();
            
            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: categories,
                    datasets: [{
                        label: 'Amount (₹)',
                        data: totals,
                        backgroundColor: '#667eea',
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '₹' + value;
                                }
                            }
                        }
                    }
                }
            });
        }

        function updatePieChart(categories, totals) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            
            if (pieChart) pieChart.destroy();
            
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe', '#ff6b6b', '#ffd93d', '#6bcf7f'];
            
            pieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories,
                    datasets: [{
                        data: totals,
                        backgroundColor: colors.slice(0, categories.length)
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function displayAnomalies(anomalies) {
            const container = document.getElementById('anomaliesList');
            
            if (anomalies.length === 0) {
                container.innerHTML = '<div class="no-anomalies">✅ No anomalies detected!</div>';
                return;
            }

            container.innerHTML = anomalies.map((anom, idx) => `
                <div class="anomaly-item">
                    <div class="date">#${idx + 1} ${anom.date}</div>
                    <div>${anom.description} <span class="category-badge">${anom.category}</span></div>
                    <div class="amount">₹${anom.amount.toFixed(0)}</div>
                    <div class="reason">⚠️ ${anom.reason}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
